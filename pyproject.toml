[tool.ruff]
line-length = 120
target-version = "py312"
src = ["backend"]
extend-exclude = [
    "backend/**/migrations/*.py",
    "backend/locale",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

[tool.ruff.lint.per-file-ignores]
"backend/**/__init__.py" = ["F401"]
"backend/aquacare_api/settings/__init__.py" = ["F403"]
"backend/aquacare_api/settings/development.py" = ["F403", "F405"]
"backend/aquacare_api/settings/production.py" = ["F403", "F405"]
"backend/aquacare_api/settings/staging.py" = ["F403", "F405"]
"backend/aquacare_api/settings/test.py" = ["F403", "F405"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
