upstream django {
    server api:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name 77.237.241.223;  # IP VPS Contabo
    client_max_body_size 20M;    # Limite upload (photos journal sanitaire)

    # Gzip compression — reduces JSON response size 60-80% (critical for 2G/3G)
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        charset utf-8;
        charset_types application/javascript text/javascript text/css;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keepalive to upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts (zones rurales Cameroun)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
