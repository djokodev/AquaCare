services:
  db:
    image: postgres:15-alpine
    container_name: aquacare_postgresDB_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # Pour scripts backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aquacare_network

  redis_cache:
    image: redis:7-alpine
    container_name: aquacare_redis_cache
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - aquacare_network

  redis_broker:
    image: redis:7-alpine
    container_name: aquacare_redis_broker
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - aquacare_network

  pgbouncer:
    image: edoburu/pgbouncer:1.21.0-p2
    container_name: aquacare_pgbouncer
    restart: always
    environment:
      # Individual vars — avoids URL-encoding issues with special chars in password
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      # pgbouncer listen port (edoburu default is 5432 — force 6432)
      LISTEN_PORT: 6432
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      POOL_MODE: transaction
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aquacare_network

  api:
    image: ghcr.io/djokodev/aquacare-api:latest
    container_name: aquacare_api
    restart: always
    # ⚠️ IMPORTANT : Démarrage en tant que root pour fix permissions, puis switch vers aquacare
    user: root
    command: >
      bash -c "
      chown -R aquacare:aquacare /app/media /app/staticfiles /app/logs 2>/dev/null || true &&
      su -s /bin/bash aquacare -c '/usr/local/bin/gunicorn mavecam_api.wsgi:application --bind 0.0.0.0:8000 --worker-class gthread --workers 6 --threads 8 --timeout 60 --max-requests 1000 --max-requests-jitter 50 --access-logfile - --error-logfile -'
      "
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=6432
      - CELERY_BROKER_URL=redis://redis_broker:6379/0
      - CELERY_RESULT_BACKEND=redis://redis_broker:6379/0
      - REDIS_CACHE_URL=redis://redis_cache:6379/0
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - aquacare_network

  celery_worker:
    image: ghcr.io/djokodev/aquacare-api:latest
    container_name: aquacare_celery_worker
    restart: always
    # Bypass entrypoint.sh (migrations/fixtures run only in `api`).
    # The worker only needs to wait for pgbouncer TCP then start.
    entrypoint: []
    command: >
      bash -c "
      echo 'Waiting for pgbouncer...' &&
      while ! nc -z pgbouncer 6432; do sleep 0.5; done &&
      echo 'pgbouncer ready — starting Celery worker' &&
      celery -A mavecam_api worker --loglevel=info --concurrency=4
      "
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=6432
      - CELERY_BROKER_URL=redis://redis_broker:6379/0
      - CELERY_RESULT_BACKEND=redis://redis_broker:6379/0
      - REDIS_CACHE_URL=redis://redis_cache:6379/0
      - EMAIL_HOST=${EMAIL_HOST:-smtp.sendgrid.net}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-noreply@mavecam.com}
    depends_on:
      db:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - aquacare_network

  celery_beat:
    image: ghcr.io/djokodev/aquacare-api:latest
    container_name: aquacare_celery_beat
    restart: always
    # Bypass entrypoint.sh — beat only needs pgbouncer reachable then starts.
    entrypoint: []
    command: >
      bash -c "
      echo 'Waiting for pgbouncer...' &&
      while ! nc -z pgbouncer 6432; do sleep 0.5; done &&
      echo 'pgbouncer ready — starting Celery beat' &&
      celery -A mavecam_api beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
      "
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=6432
      - CELERY_BROKER_URL=redis://redis_broker:6379/0
      - CELERY_RESULT_BACKEND=redis://redis_broker:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis_broker:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - aquacare_network

  nginx:
    image: ghcr.io/djokodev/aquacare-nginx:latest
    container_name: aquacare_nginx
    restart: always
    ports:
      # Exposé uniquement en local — le nginx hôte proxie api.aquacare.tech → 127.0.0.1:8080
      - "127.0.0.1:8080:80"
    volumes:
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - api
    networks:
      - aquacare_network

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
  redis_data:
    driver: local


networks:
  aquacare_network:
    driver: bridge
