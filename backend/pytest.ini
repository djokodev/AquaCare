[pytest]
# Configuration pytest pour MAVECAM AquaCare
DJANGO_SETTINGS_MODULE = mavecam_api.settings.test
python_files = test_*.py *_test.py tests.py
python_classes = Test* *Tests
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=apps
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --reuse-db
    -n auto
testpaths = tests apps/accounts/tests apps/aquaculture/tests apps/commerce/tests apps/notifications/tests apps/chat/tests
markers =
    slow: marque les tests lents
    integration: tests d'intégration avec API
    unit: tests unitaires isolés
filterwarnings =
    ignore:'asyncio.iscoroutinefunction' is deprecated and slated for removal in Python 3.16; use inspect.iscoroutinefunction\(\) instead:DeprecationWarning:django\.contrib\.auth\.decorators
